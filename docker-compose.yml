services:
  # --- Infrastructure ---
  postgres:
    image: postgres:16
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"

  # --- ForgeAI (Rails) ---
  web:
    build:
      context: ./ForgeAI
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ./ForgeAI:/workspaces/ForgeAI:cached
      - bundle-cache:/usr/local/bundle
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/forge_ai_development
      REDIS_URL: redis://redis:6379/0
      AI_SERVICE_URL: http://ai-service:8000
    command: bash -c "bundle install && bin/rails db:prepare && bin/rails server -b 0.0.0.0"

  # --- ForgeAIService (FastAPI / Python) ---
  ai-service:
    build:
      context: ./ForgeAIService
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ./ForgeAIService:/workspaces/ForgeAIService:cached
    ports:
      - "8000:8000"
    command: bash -c "pip install -r /workspaces/ForgeAIService/requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    working_dir: /workspaces/ForgeAIService

  # --- ForgeAI-Mobile (Expo / Metro) ---
  mobile:
    build:
      context: ./ForgeAI-Mobile
    volumes:
      - ./ForgeAI-Mobile:/app
      - /app/node_modules
    ports:
      - "8081:8081"
    environment:
      CI: "1"
      WATCHPACK_POLLING: "true"
    stdin_open: true
    tty: true

volumes:
  postgres-data:
  redis-data:
  bundle-cache:
